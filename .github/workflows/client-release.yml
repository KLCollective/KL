name: Client Release

on:
  push:
    tags:
      - "client-v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $TAG = $env:GITHUB_REF_NAME -replace 'client-v', ''
          "version=$TAG" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8
          if ($TAG -match '-') {
            "prerelease=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8
          } else {
            "prerelease=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8
          }

      - name: Prepare Environment
        uses: ./.github/actions/prepare-environment
        with:
          project: KinkLinkClient
          dalamud-distrib: ""

      - name: Build and Upload Artifact
        uses: ./.github/actions/build-with-artifact
        with:
          project: KinkLinkClient
          version: ${{ steps.version.outputs.version }}

      - name: Create Release
        uses: ./.github/actions/create-release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          project: KinkLinkClient
          version: ${{ steps.version.outputs.version }}

  update-repo:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Update repo.json
        uses: ./.github/actions/update-repo
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          project: KinkLinkClient
          version: ${{ needs.build.outputs.version }}
          url: https://github.com/${{ github.repository }}/releases/download/client-v${{ needs.build.outputs.version }}/KinkLinkClient.zip
          testing: false
          branch: main