name: Client Testing Build

on:
  push:
    tags:
      - "client-testing-v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $TAG = $env:GITHUB_REF_NAME -replace 'client-testing-v', ''
          "version=$TAG" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8

      - name: Prepare Environment
        uses: ./.github/actions/prepare-environment
        with:
          project: KinkLinkClient
          dalamud-distrib: ""

      - name: Build and Upload Artifact
        uses: ./.github/actions/build-with-artifact
        with:
          project: KinkLinkClient
          version: ${{ steps.version.outputs.version }}

      - name: Find artifact
        id: artifact
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $ARTIFACT = Get-ChildItem -Filter "KinkLinkClient.zip" | Select-Object -First 1
          "path=$($ARTIFACT.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kinklink-client-testing
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 5

  update-repo:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Update repo.json
        uses: ./.github/actions/update-repo
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          project: KinkLinkClient
          version: ${{ needs.build.outputs.version }}
          url: ${{ env.KINKLINK_DOWNLOAD_URL }}
          testing: true
          branch: main
        env:
          KINKLINK_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/client-testing-v${{ needs.build.outputs.version }}/KinkLinkClient.zip